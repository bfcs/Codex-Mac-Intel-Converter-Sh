name: Rebuild Intel DMG
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download latest Codex DMG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo openai/codex --pattern 'codex-aarch64-apple-darwin.dmg' --output Codex.dmg --clobber

      - name: Inspect DMG
        run: |
          mkdir -p mount
          hdiutil attach -readonly -nobrowse -mountpoint mount Codex.dmg
          echo "Contents of DMG:"
          ls -R mount
          hdiutil detach mount

      - name: Run rebuild script
        run: |
          # The script expects Codex.app. If the name is different, we might need to symlink or rename.
          # But first let's see the inspection output.
          # I'll also modify the script locally if needed, or just pass the right path.
          chmod +x ./build-intel.sh
          ./build-intel.sh Codex.dmg

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          files: |
            CodexAppMacIntel.dmg
            log.txt
          tag_name: rebuild-${{ github.run_id }}
          name: Rebuild Intel Version (${{ github.run_id }})
          body: |
            Automatically rebuilt from openai/codex latest release.
            Run ID: ${{ github.run_id }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
