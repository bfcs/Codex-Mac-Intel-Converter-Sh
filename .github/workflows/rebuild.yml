name: Rebuild Intel DMG
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download Codex DMG
        run: |
          # The user mentioned openai/codex releases, but the official desktop app DMG 
          # is actually hosted at the URL used by the CLI.
          # We'll try to find it in releases first as requested, then fallback to the official URL.
          
          echo "Attempting to download from GitHub releases..."
          if gh release download --repo openai/codex --pattern 'Codex.dmg' --output Codex.dmg --clobber 2>/dev/null; then
            echo "Downloaded Codex.dmg from GitHub releases."
          else
            echo "Codex.dmg not found in GitHub releases. Downloading from official static URL..."
            curl -L "https://persistent.oaistatic.com/codex-app-prod/Codex.dmg" -o Codex.dmg
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run rebuild script
        run: |
          chmod +x ./build-intel.sh
          ./build-intel.sh Codex.dmg

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          files: |
            CodexAppMacIntel.dmg
            log.txt
          tag_name: rebuild-${{ github.run_id }}
          name: Rebuild Intel Version (${{ github.run_id }})
          body: |
            Automatically rebuilt from official Codex DMG.
            Run ID: ${{ github.run_id }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
