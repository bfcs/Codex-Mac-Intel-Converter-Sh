name: Rebuild Intel DMG
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download Codex DMG
        run: |
          echo "Downloading official Codex Desktop DMG..."
          curl -L "https://persistent.oaistatic.com/codex-app-prod/Codex.dmg" -o Codex.dmg

      - name: Extract Version
        id: get_version
        run: |
          mkdir -p vmount
          hdiutil attach -readonly -nobrowse -mountpoint vmount Codex.dmg
          # 提取 App 的版本号
          VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "vmount/Codex.app/Contents/Info.plist")
          echo "Detected Codex Version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          hdiutil detach vmount

      - name: Run rebuild script
        run: |
          chmod +x ./build-intel.sh
          ./build-intel.sh Codex.dmg
          # 重命名输出文件以包含版本号
          mv CodexAppMacIntel.dmg "Codex-v${{ steps.get_version.outputs.version }}-Intel.dmg"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Codex-v${{ steps.get_version.outputs.version }}-Intel.dmg
            log.txt
          tag_name: "v${{ steps.get_version.outputs.version }}-intel"
          name: "Codex v${{ steps.get_version.outputs.version }} (Intel Mac)"
          body: |
            Rebuilt for Intel Mac.
            Source: https://persistent.oaistatic.com/codex-app-prod/Codex.dmg
            Version: ${{ steps.get_version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
